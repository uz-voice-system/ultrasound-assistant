networks:
  us-backend:

services:
  
  # Брокер сообщений
  rabbitmq:
    image: rabbitmq:3-management
    container_name: us-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - us-backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  # БД Event Store (для Aggregation Service)
  eventstore.db:
    image: postgres:15
    container_name: us-eventstore
    environment:
      POSTGRES_DB: event_store
      POSTGRES_USER: event_user
      POSTGRES_PASSWORD: event_pass
    ports:
      - "5433:5432"
    volumes:
      - eventstore_data:/var/lib/postgresql/data
    networks:
      - us-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event_user -d event_store"]
      interval: 5s
      timeout: 5s
      retries: 10

  # БД Read DB (для Projection Service)
  read.db:
    image: postgres:15
    container_name: us-readdb
    environment:
      POSTGRES_DB: read_db
      POSTGRES_USER: read_user
      POSTGRES_PASSWORD: read_pass
    ports:
      - "5434:5432"
    volumes:
      - readdb_data:/var/lib/postgresql/data
    networks:
      - us-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U read_user -d read_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # БД Audit DB (для Audit Service)
  audit.db:
    image: postgres:15
    container_name: us-auditdb
    environment:
      POSTGRES_DB: audit_db
      POSTGRES_USER: audit_user
      POSTGRES_PASSWORD: audit_pass
    ports:
      - "5435:5432"
    volumes:
      - auditdb_data:/var/lib/postgresql/data
    networks:
      - us-backend

  # API Gateway
  api-gateway:
    container_name: us-api-gateway
    build:
      context: .
      dockerfile: src/UltrasoundAssistant.ApiGateway/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      Services__AggregationBaseUrl: http://aggregation-service:8080
      Services__ProjectionBaseUrl: http://projection-service:8080
      Services__ReportGeneratorBaseUrl: http://report-generator:8080
    depends_on:
      - rabbitmq
      - aggregation-service
      - projection-service
    networks:
      - us-backend

  # Aggregation Service
  aggregation-service:
    container_name: us-aggregation-service
    build:
      context: .
      dockerfile: src/UltrasoundAssistant.AggregationService/Dockerfile
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__AggregationDb: Host=eventstore.db;Port=5432;Database=event_store;Username=event_user;Password=event_pass
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__Username: admin
      RabbitMq__Password: admin
    depends_on:
      rabbitmq:
        condition: service_healthy
      eventstore.db:
        condition: service_healthy
    networks:
      - us-backend

# Projection Service
  projection-service:
    container_name: us-projection-service
    build:
      context: .
      dockerfile: src/UltrasoundAssistant.ProjectionService/Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__ReadDb: Host=read.db;Port=5432;Database=read_db;Username=read_user;Password=read_pass
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__Exchange: ultrasound.events
      RabbitMq__Queue: projection-service
      RabbitMq__Username: admin
      RabbitMq__Password: admin
      RabbitMq__VirtualHost: /
    depends_on:
      rabbitmq:
        condition: service_healthy
      read.db:
        condition: service_healthy
    networks:
      - us-backend

  # VoiceProcessingService
  # voice-processing-service:
  #   container_name: us-voice-processing-service
  #   build:
  #     context: .
  #     dockerfile: src/UltrasoundAssistant.VoiceProcessingService/Dockerfile
  #   ports:
  #     - "5003:8080"
  #   environment:
  #     ASPNETCORE_ENVIRONMENT: Docker
  #     ProjectionApi__BaseUrl: http://projection-service:8080
  #     Whisper__Model: base
  #     Whisper__ModelsPath: /tmp/models
  #   volumes:
  #     - whisper_models:/tmp/models
  #   depends_on:
  #     projection-service:
  #       condition: service_started
  #   networks:
  #     - us-backend

  # Audit Service
  audit-service:
    container_name: us-audit-service
    build:
      context: .
      dockerfile: src/UltrasoundAssistant.AuditService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__AuditDb: Host=audit.db;Port=5432;Database=audit_db;Username=audit_user;Password=audit_pass
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__Username: admin
      RabbitMQ__Password: admin
    depends_on:
      rabbitmq:
        condition: service_started
      audit.db:
        condition: service_started
    networks:
      - us-backend

  # Report Generator
  report-generator:
    container_name: us-report-generator
    build:
      context: .
      dockerfile: src/UltrasoundAssistant.ReportGenerator/Dockerfile
    ports:
    - "5004:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      Services__ProjectionBaseUrl: http://projection-service:8080
    depends_on:
      projection-service:
        condition: service_started
    networks:
      - us-backend

volumes:
  rabbitmq_data:
  eventstore_data:
  readdb_data:
  auditdb_data:
  # whisper_models: